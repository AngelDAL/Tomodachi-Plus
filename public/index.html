<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomodachi POS</title>
    <!-- Local Fonts -->
    <link rel="stylesheet" href="css/fonts.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
    <!-- Base Styles -->
    <link rel="stylesheet" href="css/landing.css">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .welcome-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        .logo-large {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            fill: var(--primary-color);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--text-color);
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        .btn-full {
            width: 100%;
            margin-bottom: 15px;
            justify-content: center;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="welcome-card">
        <svg class="logo-large" viewBox="0 0 978 978" version="1.1" xmlns="http://www.w3.org/2000/svg"

        </a>
        <a href="register.html" class="btn btn-outline btn-full">

        </a>
    </div>

</html>
