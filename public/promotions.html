<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promociones - Tomodachi</title>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/promotions.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="sidebar-close" id="sidebarClose" aria-label="Cerrar menú"><i class="fas fa-times"></i></button>
                <h2>Tomodachi</h2>
            </div>
            <nav class="sidebar-nav">
                <!-- Navigation Loaded by js/sidebar-loader.js -->
            </nav>
        </aside>
        
        <main class="main-content">
            <div class="content-padding">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h1>Gestión de Promociones</h1>
                    <button id="newPromoBtn" class="btn-add-product" type="button">
                        <i class="fas fa-plus"></i> Nueva Promoción
                    </button>
                </div>

                <div id="promotionsList">
                    <!-- Cargando... -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal estilo split -->
    <div id="promoModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="promoModalTitle">Nueva Promoción</h3>
                <button class="modal-close" id="closePromoModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-split-body">
                <!-- Lado Izquierdo: Formulario -->
                <div class="modal-form-side">
                    <form id="promoForm">
                        <div class="form-group">
                            <label>Nombre de la Promoción</label>
                            <div class="input-icon-wrapper">
                                <i class="fas fa-heading"></i>
                                <input type="text" name="name" required class="form-control" placeholder="Ej. Oferta de Verano">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Fecha Inicio</label>
                                <div class="input-icon-wrapper">
                                    <i class="fas fa-calendar-alt"></i>
                                    <input type="datetime-local" name="start_date" required class="form-control">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Fecha Fin</label>
                                <div class="input-icon-wrapper">
                                    <i class="fas fa-calendar-check"></i>
                                    <input type="datetime-local" name="end_date" required class="form-control">
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Tipo de Promoción</label>
                            <div class="input-icon-wrapper">
                                <i class="fas fa-list-ul"></i>
                                <select name="type" id="promoType" class="form-control" onchange="updateFormFields()">
                                    <option value="simple_discount">Descuento Simple (Producto/Categoría)</option>
                                    <option value="bulk_discount">Descuento por Volumen (Ej. 3x2)</option>
                                    <option value="bill_discount">Descuento en Total de Cuenta</option>
                                    <option value="bundle">Paquete (Bundle)</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row" id="discountFields">
                            <div class="form-group">
                                <label>Tipo de Descuento</label>
                                <div class="input-icon-wrapper">
                                    <i class="fas fa-percentage"></i>
                                    <select name="discount_type" class="form-control" onchange="calculateProfit()">
                                        <option value="percentage">Porcentaje (%)</option>
                                        <option value="fixed_amount">Monto Fijo ($)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Valor del Descuento</label>
                                <div class="input-icon-wrapper">
                                    <i class="fas fa-dollar-sign"></i>
                                    <input type="number" name="discount_value" step="0.01" required class="form-control" placeholder="10" oninput="calculateProfit()">
                                </div>
                            </div>
                        </div>
                        
                        <div id="bundlePriceField" class="form-group" style="display:none;">
                            <label>Precio Final del Paquete</label>
                            <div class="input-icon-wrapper">
                                <i class="fas fa-tag"></i>
                                <input type="number" name="bundle_price" step="0.01" class="form-control" placeholder="99.90" oninput="calculateProfit()">
                            </div>
                        </div>

                        <div id="conditionFields" class="form-row">
                            <!-- Dynamic -->
                        </div>

                        <!-- Análisis de Ganancia -->
                        <div class="profit-analysis" id="profitAnalysisBox">
                            <div class="profit-title"><i class="fas fa-chart-pie"></i> Análisis de Rentabilidad</div>
                            <div class="profit-row">
                                <span>Ganancia Actual (Total):</span>
                                <span class="profit-value" id="currentProfit">$0.00</span>
                            </div>
                            <div class="profit-row">
                                <span>Ganancia con Promo:</span>
                                <span class="profit-value" id="newProfit">$0.00</span>
                            </div>
                            <div class="profit-row profit-diff" id="profitDiffRow">
                                <span>Diferencia:</span>
                                <span class="profit-value" id="profitDiff">$0.00</span>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Lado Derecho: Grid de Productos -->
                <div class="modal-grid-side">
                    <div class="grid-header">
                        <label>Catálogo de Productos</label>
                        <div class="input-icon-wrapper" style="width: 60%;">
                             <i class="fas fa-search"></i>
                            <input type="text" id="productGridSearch" placeholder="Buscar producto..." class="form-control">
                        </div>
                    </div>
                    <!-- Indicador visual para bundles -->
                    <div id="bundleInfoMsg" style="display:none; font-size:0.85em; background:#e0f2fe; color:#0369a1; padding:8px; border-radius:6px; margin-bottom:8px;">
                        <i class="fas fa-info-circle"></i> <b>Modo Paquete:</b> Los productos seleccionados formarán un único pack indivisible.
                    </div>
                    
                    <div id="productsGrid" class="products-grid-container" style="flex:1; overflow-y:auto;">
                        <!-- Grid Content -->
                    </div>

                    <!-- Sección de Productos Seleccionados (Bottom) -->
                    <div id="selectedProductsSection" class="selected-products-panel" style="display: none;">
                        <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
                            <label style="font-weight:600; font-size:0.9rem;">Productos Seleccionados</label>
                            <span class="badge" id="selectedCountNum" style="background:var(--primary-color); color:white; padding:2px 8px; border-radius:10px; font-size:0.8rem;">0</span>
                        </div>
                        <div id="selectedProductsList" style="display: flex; flex-wrap: wrap; gap: 8px; max-height: 100px; overflow-y: auto;">
                            <!-- Chips -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closePromoModal()">Cancelar</button>
                <button type="submit" form="promoForm" class="btn-primary" style="padding: 10px 24px;">Guardar Promoción</button>
            </div>
        </div>
    </div>

    <style>
        .selected-chip {
            background-color: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 4px 10px;
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            animation: fadeIn 0.3s ease;
        }
        .selected-chip img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 8px;
        }
        .selected-chip span {
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .selected-chip .remove-chip {
            margin-left: 6px;
            color: var(--danger-color);
            cursor: pointer;
            padding: 2px;
        }
        .selected-chip .remove-chip:hover {
            color: #d32f2f;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
    <!-- Confirm Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <div class="modal-header" style="justify-content: center; border-bottom: none; padding-bottom: 0;">
                <h3 id="confirmTitle">Confirmar Acción</h3>
            </div>
            <div class="modal-body" style="padding: 20px;">
                <p id="confirmMessage" style="color: var(--text-color); margin-bottom: 20px;">¿Estás seguro?</p>
                <div style="display: flex; justify-content: center; gap: 10px;">
                    <button class="btn btn-secondary" onclick="closeConfirmModal()">Cancelar</button>
                    <button class="btn btn-danger" id="confirmBtnAction">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container (if needed for specific positioning, though existing css/js might handle body append) -->

    <script src="js/sidebar-loader.js"></script>
    <script src="js/app.js"></script>
    <script src="js/promotions.js"></script>
    <script src="js/promotions-app.js"></script>
    <script>
    // Mostrar mensaje solo si es bundle
    function toggleBundleInfoMsg() {
        var type = document.getElementById('promoType').value;
        var msg = document.getElementById('bundleInfoMsg');
        if (msg) msg.style.display = (type === 'bundle') ? 'block' : 'none';
    }
    document.getElementById('promoType').addEventListener('change', toggleBundleInfoMsg);
    document.addEventListener('DOMContentLoaded', toggleBundleInfoMsg);
    </script>
</body>
</html>
