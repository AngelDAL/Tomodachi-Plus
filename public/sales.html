<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>Punto de Venta - Tomodachi</title>
    <!-- Local Fonts -->
    <link rel="stylesheet" href="css/fonts.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="lib/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/sales.css">
    <link rel="stylesheet" href="css/scanner_overlay.css">
    <link rel="stylesheet" href="css/bulk_sales.css">
    <link rel="stylesheet" href="css/cart_responsive.css">
    <script src="js/theme-init.js"></script>
</head>

<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="sidebar-close" id="sidebarClose" aria-label="Cerrar menú"><i
                        class="fas fa-times"></i></button>
                <h2>Tomodachi</h2>
            </div>
            <nav class="sidebar-nav">
                <!-- Navigation Loaded by js/sidebar-loader.js -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="pos-container">
                <!-- Scanner Container removed from here -->

                <!-- Componentes Utilitarios (Visibillidad condicional) -->
                <div id="scaleStatusIndicator" class="scale-status-indicator hidden">
                    <i class="fas fa-balance-scale"></i>
                    <span id="scaleStatus">Desconectado</span>
                    <span id="scaleWeight" style="display: none;">(<span id="scaleWeightValue">--.--</span> <span id="scaleWeightUnit">kg</span>)</span>
                </div>

                <!-- Main POS Grid Layout -->
                <div class="pos-content-grid">
                    <!-- Mobile View Switcher -->
                    <div class="mobile-view-controls">
                        <button class="view-switch-btn active" data-target="products-column">
                            <i class="fas fa-th"></i> Productos
                        </button>
                        <button class="view-switch-btn" data-target="cart-column">
                            <i class="fas fa-shopping-cart"></i> Carrito
                            <span id="mobileCartCount" class="badge-count hidden">0</span>
                        </button>
                    </div>

                    <!-- Botón Flotante (Eliminado/Oculto porque usamos el interno) -->
                    <button id="closeScannerOverlayBtn" title="Cerrar Escáner" class="hidden" style="display:none;">
                        <i class="fas fa-times"></i>
                    </button>

                    <!-- Products Column -->
                    <div class="products-column active" id="productsColumn">
                        <!-- Search Bar Moved Here -->
                        <div class="product-search-container">
                            <div class="search-wrapper">
                                <i class="fas fa-search search-icon"></i>
                                <input type="text" id="searchInput" placeholder="Buscar producto..." autocomplete="off"
                                    aria-label="Buscar producto" class="search-main rounded-search">
                                
                                <button id="toggleScannerBtn" type="button" class="scanner-btn-circle" title="Activar escáner">
                                    <i class="fas fa-barcode"></i>
                                </button>
                                
                                <!-- Nuevo Botón de Configuración Circular -->
                                <div class="config-menu-wrapper">
                                    <button id="configMenuBtn" type="button" class="config-btn-circle" title="Configuración">
                                        <i class="fas fa-cog"></i>
                                    </button>
                                    
                                    <!-- Menú Desplegable -->
                                    <div id="configDropdown" class="config-dropdown-menu hidden">
                                        <div class="dropdown-header">Herramientas</div>
                                        <button id="toggleScaleBtn" class="dropdown-item">
                                            <i class="fas fa-weight-hanging"></i> <span>Conectar Balanza</span>
                                        </button>
                                        <button id="toggleCustomerDisplayBtn" class="dropdown-item">
                                            <i class="fas fa-tv"></i> <span>Pantalla Cliente</span>
                                        </button>
                                        <button id="copyDisplayLinkBtn" class="dropdown-item">
                                            <i class="fas fa-link"></i> <span>Obtener enlace para Tablet</span>
                                        </button>
                                        <button id="toggleHistoryBtn" class="dropdown-item">
                                            <i class="fas fa-history"></i> <span>Historial de Ventas</span>
                                        </button>
                                        <div class="dropdown-divider"></div>
                                        <div class="dropdown-header">Vista</div>
                                        <div class="dropdown-item-row">
                                            <i class="fas fa-sort-amount-down-alt"></i>
                                            <select id="viewOrderSelect" class="dropdown-select">
                                                <option value="default">Orden default</option>
                                                <option value="favorites">Favoritos primero</option>
                                                <option value="pinned">Fijados primero</option>
                                            </select>
                                        </div>
                                        <button id="resetViewPrefsBtn" class="dropdown-item">
                                            <i class="fas fa-undo"></i> <span>Restaurar orden</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Scanner Area (Moved Inside Column, Replaces Gallery) -->
                        <div id="scannerContainer" class="scanner-container hidden">
                            <button id="closeScannerContainerBtn" class="scanner-close-btn" title="Cerrar Escáner">
                                <i class="fas fa-times"></i>
                            </button>
                            <div id="qr-reader" style="width:100%;"></div>
                        </div>

                        <!-- Filtros (Anteriormente Category Bar) -->
                        <div class="product-filters" id="productFilters">
                            <div class="filter-group">
                                <label for="categoryFilter" class="sr-only">Categoría</label>
                                <select id="categoryFilter" class="filter-select">
                                    <option value="all">Todas las categorías</option>
                                    <!-- Options populated by JS -->
                                </select>
                            </div>
                            <div class="filter-group">
                                <label for="sortFilter" class="sr-only">Ordenar por</label>
                                <select id="sortFilter" class="filter-select">
                                    <option value="default">Relevancia</option>
                                    <option value="price_asc">Precio: Menor a Mayor</option>
                                    <option value="price_desc">Precio: Mayor a Menor</option>
                                    <option value="name_asc">Nombre: A-Z</option>
                                    <option value="newest">Recién Agregados</option>
                                </select>
                            </div>
                        </div>
                        
                        <div id="searchResults" class="search-results hidden"></div>
                        <div id="productGallery" class="gallery-main"></div>
                    </div>

                    <!-- Cart Column -->
                    <div class="cart-column" id="cartColumn">
                        <div class="cart-panel-inner">
                            <div class="cart-tabs">
                                <button class="panel-tab-btn active" data-tab="products">
                                    <span><i class="fas fa-shopping-bag"></i></span> Items
                                </button>
                                <button class="panel-tab-btn" data-tab="adjustments">
                                    <span><i class="fas fa-cog"></i></span> Ajustes
                                </button>
                            </div>
                            <!-- Tab: Productos -->
                            <div class="cart-tab-content active" id="tab-products">
                                <div class="cart-items-container" id="cartItemsContainer">
                                    <!-- Lista de items renderizada com divs -->
                                    <div id="cartBody" class="cart-list"></div>

                                    <div class="empty-cart" id="emptyCartMsg">
                                        <i class="fas fa-shopping-basket"></i>
                                        <p>Tu carrito está vacío</p>
                                    </div>
                                </div>
                            </div>
                            <!-- Tab: Ajustes -->
                            <div class="cart-tab-content" id="tab-adjustments">
                                <div class="adjustments-section">
                                    <div class="print-ticket-option">
                                        <input type="checkbox" id="printTicketCheckbox">
                                        <label for="printTicketCheckbox">Imprimir ticket</label>
                                    </div>
                                    
                                    <div class="adjustment-group">
                                        <label>Método de pago</label>
                                        <select id="paymentMethod" class="form-select">
                                            <option value="cash">Efectivo</option>
                                            <option value="card">Tarjeta</option>
                                            <option value="transfer">Transferencia</option>
                                            <option value="mixed">Mixto</option>
                                        </select>
                                    </div>

                                    <div class="adjustment-row">
                                        <div class="adj-item">
                                            <label>Descuento</label>
                                            <input type="number" id="discountInput" min="0" step="0.01" placeholder="0.00">
                                        </div>
                                        <div class="adj-item">
                                            <label>Impuesto</label>
                                            <input type="number" id="taxInput" min="0" step="0.01" placeholder="0.00">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="cart-summary-footer" id="cartFooter">
                                <div class="footer-static-content">
                                    <div class="summary-details">
                                        <div class="summary-row">
                                            <span>Subtotal</span>
                                            <span id="cartSubtotal">$0.00</span>
                                        </div>
                                        <!-- Espacio para Impuestos/Descuentos si se muestran -->
                                        <div class="summary-row total-row">
                                            <span>Total</span>
                                            <strong id="panelTotal">$0.00</strong>
                                        </div>
                                    </div>
                                    
                                    <div class="checkout-actions">
                                        <div class="payment-control-group">
                                            <div class="input-wrapper">
                                                <span class="currency-symbol">$</span>
                                                <input type="number" id="checkoutReceived" min="0" step="0.01" placeholder="Monto recibido" class="pay-input">
                                            </div>
                                            <div class="change-display">
                                                <small>Cambio</small>
                                                <span id="checkoutChange">$0.00</span>
                                            </div>
                                        </div>
                                        
                                        <button id="finalizeSaleBtn" class="btn-checkout-primary" disabled>
                                            <span class="btn-label">COBRAR</span>
                                            <i class="fas fa-arrow-right"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal para Opciones de Producto (Descuentos y Promociones) -->
    <div id="itemOptionsModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalProductName">Editar Producto</h3>
                <button class="modal-close" id="closeItemModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="current-price-info">
                    <p>Precio Original: <span id="modalOriginalPrice">$0.00</span></p>
                </div>

                <div class="discount-type-selector">
                    <label>Tipo de Ajuste:</label>
                    <select id="discountTypeSelect">
                        <option value="none">Sin descuento</option>
                        <option value="percent">Porcentaje (%)</option>
                        <option value="fixed">Descuento Fijo ($)</option>
                        <option value="nxn">Promoción NxN</option>
                    </select>
                </div>

                <!-- Opciones dinámicas -->
                <div id="opt-percent" class="discount-option hidden">
                    <label>Porcentaje de descuento:</label>
                    <div class="input-group">
                        <input type="number" id="discPercentInput" min="0" max="100" placeholder="Ej: 10">
                        <span>%</span>
                    </div>
                </div>

                <div id="opt-fixed" class="discount-option hidden">
                    <label>Monto a descontar:</label>
                    <div class="input-group">
                        <span>$</span>
                        <input type="number" id="discFixedInput" min="0" step="0.01" placeholder="0.00">
                    </div>
                </div>

                <div id="opt-nxn" class="discount-option hidden">
                    <label>Configuración NxN:</label>
                    <div class="nxn-group">
                        <div class="nxn-item">
                            <small>Lleva</small>
                            <input type="number" id="nxnBuyInput" min="1" placeholder="Ej: 2">
                        </div>
                        <div class="nxn-item">
                            <small>Paga</small>
                            <input type="number" id="nxnPayInput" min="0" placeholder="Ej: 1">
                        </div>
                    </div>
                    <p class="hint-text">Ejemplo: 2x1 (Lleva 2, Paga 1)</p>
                </div>

                <div class="final-price-preview">
                    <p>Nuevo Precio Unitario: <strong id="modalNewPrice">$0.00</strong></p>
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveItemOptionsBtn" class="btn-primary">Aplicar Cambios</button>
            </div>
        </div>
    </div>

    <!-- Modal para Historial de Ventas (Agregado) -->
    <div id="historyModal" class="modal-overlay hidden">
        <div class="modal-content history-modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-history"></i> Historial de Ventas</h3>
                <button class="modal-close" id="closeHistoryModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <div id="historyModalBody" class="modal-body history-body-scroll">
                <!-- Se llenará dinámicamente con JS -->
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i> Cargando historial...
                </div>
            </div>
            <div class="modal-footer">
                <button id="refreshHistoryBtn" class="btn-secondary"><i class="fas fa-sync-alt"></i> Actualizar</button>
            </div>
        </div>
    </div>

    <!-- Context Menu for Products -->
    <div id="productContextMenu" class="context-menu hidden">
        <div class="context-menu-header">
            <span id="contextMenuProductName"></span>
        </div>
        <div class="context-menu-items">
            <button class="context-menu-item" data-action="favorite">
                <i class="fas fa-star"></i>
                <span class="ctx-label">Favorito</span>
                <span class="ctx-check" id="ctxFavCheck"></span>
            </button>
            <button class="context-menu-item" data-action="pin">
                <i class="fas fa-thumbtack"></i>
                <span class="ctx-label">Fijar al inicio</span>
                <span class="ctx-check" id="ctxPinCheck"></span>
            </button>
            <div class="context-menu-divider"></div>
            <button class="context-menu-item" data-action="edit">
                <i class="fas fa-pen"></i>
                <span class="ctx-label">Editar producto</span>
            </button>
            <button class="context-menu-item" data-action="view-category">
                <i class="fas fa-tag"></i>
                <span class="ctx-label">Ver en categoría</span>
            </button>
        </div>
    </div>

    <!-- Voice overlay removed -->

    <script src="js/sidebar-loader.js"></script>
    <script src="js/app.js"></script>
    <script src="lib/html5-qrcode/html5-qrcode.min.js"></script>
    <script src="js/scanner.js"></script>
    <script src="js/tour.js"></script>
    <script src="lib/animejs/anime.min.js"></script>
    <script src="js/sales.js"></script>
    <!-- voice_commander removed -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const session = await checkSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            // Iniciar Tour
            if (window.TourSystem) {
                window.TourSystem.init(session);
            }

            document.body.setAttribute('data-store-id', session.store_id || 1);
            initPOS();
        });
        // Sidebar Logout handled by sidebar-loader.js
    </script>
</body>

</html>
